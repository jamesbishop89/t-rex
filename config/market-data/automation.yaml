jobs:
  - name: cmfp
    groups: [intraday]
    config: cmfp-rec.yaml
    output_stem: cmfp
    source_globs:
      - cmfp/ProcessedFiles/CMFP_MUREX_EOD-DATA_TODAY_*.csv
    source_exclude_globs:
      - "*_new.csv"
    target_globs:
      - md_cmfp_rep_itd_*.csv
    max_target_lag_minutes: 30

  - name: cmfp_eod
    groups: [eod]
