schedule_defaults:
  weekdays_only: &weekdays_only true
  hourly_05: &hourly_05
    - "00:05"
    - "01:05"
    - "02:05"
    - "03:05"
    - "04:05"
    - "05:05"
    - "06:05"
    - "07:05"
    - "08:05"
    - "09:05"
    - "10:05"
    - "11:05"
    - "12:05"
    - "13:05"
    - "14:05"
    - "15:05"
    - "16:05"
    - "17:05"
    - "18:05"
    - "19:05"
    - "20:05"
    - "21:05"
    - "22:05"
    - "23:05"
  rtsh_intraday: &rtsh_intraday
    - "04:23"
    - "08:23"
    - "11:23"
    - "14:23"
    - "17:23"
    - "20:00"
  eod_1950: &eod_1950
    - "19:50"
  eod_2050: &eod_2050
    - "20:50"
  eod_2055: &eod_2055
    - "20:55"
  eod_2155: &eod_2155
    - "21:55"

jobs:
  - name: cmfp
    groups: [intraday]
    delete_output_after_email: true
    weekdays_only: *weekdays_only
    schedule_times: *hourly_05
    config: cmfp-rec.yaml
    output_stem: cmfp
    source_globs:
      - cmfp/ProcessedFiles/CMFP_MUREX_EOD-DATA_TODAY_*.csv
    source_exclude_globs:
      - "*_new.csv"
    target_globs:
      - md_cmfp_rep_itd_*.csv
    max_target_lag_minutes: 30

  - name: cmfp_eod
    groups: [eod]
    retain_output_days: 7
    weekdays_only: *weekdays_only
    schedule_times: *eod_2055
    config: cmfp-rec.yaml
    output_stem: cmfp_eod
    source_globs:
      - cmfp_eod/ProcessedFiles/CMFP_MUREX_EOD-DATA_TODAY_*.csv
    source_exclude_globs:
      - "*_new.csv"
    target_globs:
      - md_cmfp_rep_eod_*.csv
    max_target_lag_minutes: 30

  - name: cmop_eod
